<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="wave" x1="130" y1="256" x2="420" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square app background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Microphone -->
  <g>
    <rect x="148" y="118" width="88" height="168" rx="44" fill="#FFFFFF"/>
    <path d="M112 246c0 51 36 88 80 88s80-37 80-88" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" fill="none"/>
    <line x1="192" y1="334" x2="192" y2="382" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
    <line x1="140" y1="392" x2="244" y2="392" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
  </g>

  <!-- Flow wave: speech turning into a stream of text -->
  <g stroke="url(#wave)" stroke-linecap="round" fill="none">
    <path d="M286 196 q22 -34 44 0 t44 0 t44 0" stroke-width="20"/>
    <path d="M286 256 q22 -34 44 0 t44 0 t44 0 t44 0" stroke-width="20"/>
    <path d="M286 316 q22 -34 44 0 t44 0" stroke-width="20"/>
  </g>
</svg>
